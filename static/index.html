function renderHistoryList(title, history) {
  const items = Array.isArray(history) ? history.slice(-8).reverse() : [];
  if (!items.length) return '';
  return `<div class="source-compare-col">
    <div class="source-col-title">${esc(title)}</div>
    <div class="history-list">
      ${items.map(item => {
        const meta = [];
        if (item.task_id) meta.push(`任务 ${item.task_id}`);
        if (item.duration_ms !== undefined) meta.push(`耗时 ${item.duration_ms}ms`);
        if (item.prompt_source) meta.push(`提示词来源 ${item.prompt_source}`);
        if (item.error) meta.push(`错误 ${item.error}`);
        if (item.reason) meta.push(item.reason);
        if (item.output_path) meta.push(item.output_path);
        if (item.previous_local_path) meta.push(`上一版 ${item.previous_local_path}`);
        return `<div class="history-item">
          <div class="history-item-main"><span>${esc(historyEventLabel(item.event))}</span><span>${esc(item.at || '')}</span></div>
          ${meta.length ? `<div class="history-item-meta">${meta.map(esc).join('<br>')}</div>` : ''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderGenerationHistory(board) {
  const storyboardHistory = renderHistoryList('故事板图', board.storyboard_image?.history);
  const videoHistory = renderHistoryList('视频', board.video?.history);
  if (!storyboardHistory && !videoHistory) return '';
  return `<details class="detail-fold"><summary>生成历史</summary><div class="source-compare-grid">${storyboardHistory}${videoHistory}</div></details>`;
}

function historyEventLabel(event) {
  const m = {
    submit_asset: '提交资产图',
    submit_storyboard: '提交故事板图',
    submit_storyboard_failed: '故事板图提交失败',
    submit_video: '提交视频',
    submit_video_failed: '视频提交失败',
    mark_stale: '标记需重生成',
  };
  return m[event] || event || '记录';
}

function renderBoardSourceReview(board) {
  const trace = board.source_trace || [];
  const review = board.review || {};
  const voices = board.voice_timeline || [];
  const shots = board.shot_timeline || [];
  if (!trace.length && !review.source_excerpt && !voices.length && !shots.length && !(review.warnings || []).length) return '';
  const sourceText = review.source_excerpt || trace.map(item => item.text || '').join('');
  const allowed = review.allowed_characters || [];
  const removed = review.removed_characters || [];
  const warnings = review.warnings || [];
  const sourceItems = trace.length
    ? trace.map((item, index) => `
      <div class="source-item">
        <div class="source-item-meta">${esc(item.slice_id || `source-${index + 1}`)} · ${esc(item.kind || '')}${item.speaker ? ` · ${esc(item.speaker)}` : ''}${item.source_start != null && item.source_end != null ? ` · ${item.source_start}-${item.source_end}` : ''}</div>
        <div class="source-item-text">${esc(item.text || '')}</div>
      </div>`)
    : (sourceText ? [`<div class="source-item"><div class="source-item-meta">source</div><div class="source-item-text">${esc(sourceText)}</div></div>`] : []);
  const voiceItems = voices.map(beat => `
    <div class="source-item">
      <div class="source-item-meta">${esc(beat.beat_id || '')} · ${beat.start ?? ''}-${beat.end ?? ''}s · ${esc(beat.type === 'dialogue' ? '对白' : '旁白')}${beat.speaker ? ` · ${esc(beat.speaker)}` : ''}</div>
      <div class="source-item-text">${esc(beat.text || '')}</div>
    </div>`);
  const shotItems = shots.map(shot => `
    <div class="source-item">
      <div class="source-item-meta">${esc(shot.shot_id || '')} · ${shot.start ?? ''}-${shot.end ?? ''}s · ${esc(shot.camera || '')}</div>
      <div class="source-item-text">${esc(shot.visual || '')}</div>
      <div class="source-item-sub">${(shot.characters || []).length ? `角色：${(shot.characters || []).map(esc).join('、')}` : '角色：未标注'}${shot.scene ? ` · 场景：${esc(shot.scene)}` : ''}</div>
    </div>`);
  const footParts = [];
  if (allowed.length) footParts.push(`允许角色：${allowed.map(esc).join('、')}`);
  if (removed.length) footParts.push(`已移除：${removed.map(esc).join('、')}`);
  if (warnings.length) footParts.push(`<span class="danger-text">${warnings.map(esc).join('；')}</span>`);
  return `
    <section class="source-compare-panel" aria-label="原文对照">
      <div class="source-compare-head">
        <div>
          <div class="source-compare-title">原文对照</div>
          <div class="source-compare-meta">${sourceItems.length} 段原文 · ${voiceItems.length} 条声音 · ${shotItems.length} 个镜头</div>
        </div>
      </div>
      <div class="source-compare-grid">
        <div class="source-compare-col">
          <div class="source-col-title">原文切片</div>
          ${sourceItems.join('') || '<div class="source-item"><div class="source-item-text">暂无原文依据</div></div>'}
        </div>
        <div class="source-compare-col">
          <div class="source-col-title">声音文本</div>
          ${voiceItems.join('') || '<div class="source-item"><div class="source-item-text">暂无声音文本</div></div>'}
        </div>
        <div class="source-compare-col">
          <div class="source-col-title">当前镜头</div>
          ${shotItems.join('') || '<div class="source-item"><div class="source-item-text">暂无镜头</div></div>'}
        </div>
      </div>
      ${footParts.length ? `<div class="source-review-foot">${footParts.join('<br>')}</div>` : ''}
    </section>
  `;
}

function assetRef(name, bucket) {
  const info = pipelineData?.assets?.[bucket]?.[name];
  return info && (info.local_path || info.url) ? info : null;
}

function boardReferenceInfo(board) {
  const refs = board.asset_refs || {};
  const expected = [];
  const videoExpected = [];
  (refs.characters || []).forEach(name => expected.push(['characters', name]));
  (refs.characters || []).forEach(name => videoExpected.push(['characters', name]));
  if (refs.scene) expected.push(['scenes', refs.scene]);
  (refs.props || []).forEach(name => expected.push(['props', name]));
  const ready = [];
  const missing = [];
  const videoMissing = [];
  expected.forEach(([bucket, name]) => {
    if (assetRef(name, bucket)) ready.push(name); else missing.push(name);
  });
  videoExpected.forEach(([bucket, name]) => {
    if (!assetRef(name, bucket)) videoMissing.push(name);
  });
  const sbReady = board.storyboard_image?.local_path || board.storyboard_image?.url;
  const videoTotal = videoExpected.length + (sbReady ? 1 : 0);
  return {
    ready, missing, videoMissing,
    text: missing.length
      ? `参考图：${ready.length}/${expected.length} 个资产已就绪，缺少 ${missing.join('、')}。请补齐后再生成分镜。`
      : `参考图：${ready.length}/${expected.length} 个资产已就绪。视频生成会带分镜图${sbReady ? '' : '（待完成）'}和角色参考图，共 ${videoTotal} 张。`
  };
}

function renderVoiceTimingNote(info) {
  if (!info || (!info.issues.length && !info.required)) return '';
  const cls = info.issues.length ? 'ref-note err' : 'ref-note';
  const detail = info.issues.length ? `<br>${info.issues.map(esc).join('<br>')}` : '';
  return `<div class="${cls}">旁白时长：规划 ${info.planned}s，按字数估算至少 ${info.required}s，board ${info.boardDuration}s。${detail}</div>`;
}

function renderVoiceTL(beats) {
  if (!beats.length) return '';
  return `<details class="detail-fold"><summary>声音时间轴</summary><div class="bd-section"><table class="tl-table">
    <tr><th>ID</th><th>时间</th><th>类型</th><th>说话者</th><th>文本</th></tr>
    ${beats.map(b => {
      const speaker = b.type === 'narration' && pipelineData?.narration_style === 'first_person' && b.speaker && b.speaker !== '旁白'
        ? `我（${b.speaker}）`
        : b.speaker;
      return `<tr><td>${esc(b.beat_id)}</td><td class="time">${b.start}-${b.end}s</td>
      <td>${b.type === 'narration' ? '旁白' : '对白'}</td>
      <td class="${b.type === 'narration' ? 'narrator' : 'dialogue'}">${esc(speaker)}</td>
      <td>${esc(b.text)}</td></tr>`;
    }).join('')}
  </table></div></details>`;
}

function renderShotTL(shots, beats) {
  if (!shots.length) return '';
  const bm = {}; beats.forEach(b => bm[b.beat_id] = b);
  return `<details class="detail-fold"><summary>镜头时间轴</summary><div class="bd-section"><div class="shot-grid">
    <div class="shot-row"><div class="sh-hdr">镜头</div><div class="sh-hdr">时间</div><div class="sh-hdr">画面</div><div class="sh-hdr">声音设计</div></div>
    ${shots.map(s => {
      const refs = (s.voice_refs || []).map(r => bm[r]?.text || r).join('; ');
      return `<div class="shot-row">
        <div class="sh-cell" style="font-weight:500">${esc(s.shot_id)}</div>
        <div class="sh-cell sh-time">${s.start}-${s.end}s</div>
        <div class="sh-cell">${esc(s.visual)}<div class="sh-sub">${esc(s.camera)} · ${esc(s.match_strategy)} · ${esc(s.purpose || '')}</div></div>
        <div class="sh-cell">${esc(audioLabel(s.audio_behavior))}${refs ? '<div class="sh-sub">引用: ' + esc(refs) + '</div>' : ''}</div>
      </div>`;
    }).join('')}
  </div></div></details>`;
}

function audioLabel(ab) {
  const m = { narration_sync:'旁白同步', narration_over:'旁白覆盖', dialogue_sync:'对白同步', dialogue_offscreen:'画外对白', phone_dialogue:'电话对白', ambient_only:'环境声', sound_lead_in:'声音引入', dramatic_silence:'戏剧静默', ambient_transition:'环境转场' };
  return m[ab] || ab;
}

function statusLabel(s) {
  const m = { needed:'待生成', submitted:'生成中', completed:'已完成', failed:'失败' };
  return m[s] || s;
}

/* ── Submit tasks ── */
function assetInfo(assetType, assetName) {
  return pipelineData?.assets?.[assetType]?.[assetName] || null;
}

function showAssetPromptModal(assetType, assetName) {
  const info = assetInfo(assetType, assetName);
  if (!info) return;
  const root = document.getElementById('modal-root');
  root.style.display = 'flex';
  const title = `${assetName} · ${assetType === 'characters' ? '角色' : assetType === 'scenes' ? '场景' : '道具'}`;
  root.innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="asset-prompt-title">
        <h2 id="asset-prompt-title">编辑资产提示词</h2>
        <div class="ref-note" style="margin-top:0">当前状态：${statusLabel(info.status || 'needed')}。保存后会立即提交 Vidu 重新生成。</div>
        <label>资产</label>
        <input value="${esc(title)}" disabled>
        <label>设定 seed</label>
        <textarea style="min-height:76px" disabled>${esc(info.seed || '')}</textarea>
        <label for="asset-prompt-text">生成提示词</label>
        <textarea id="asset-prompt-text" style="min-height:220px">${esc(info.prompt || '')}</textarea>
        <div class="modal-acts">
          <button class="btn" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick='submitAssetFromModal(${JSON.stringify(assetType)}, ${JSON.stringify(assetName)})'>保存并重生成</button>
        </div>
      </div>
    </div>
  `;
  setTimeout(() => document.getElementById('asset-prompt-text')?.focus(), 0);
}

async function submitAssetFromModal(assetType, assetName) {
  const prompt = document.getElementById('asset-prompt-text')?.value || '';
  await submitAsset(assetType, assetName, prompt, true);
  closeModal();
}

async function submitAsset(assetType, assetName, prompt = null, force = false) {
  if (!currentProject) return;
  try {
    const info = assetInfo(assetType, assetName);
    if (info) {
      info.status = 'submitted';
      if (prompt) info.prompt = prompt;
      renderAssets();
      renderActiveModule();
    }
    const result = await api('/api/tasks/submit-asset', {
      method: 'POST',
      body: {
        project_name: currentProject,
        asset_type: assetType,
        asset_name: assetName,
        prompt,
        force,
      }
    });
    showInlineInfo(`${assetName} 已提交生成${result.task_id ? `，任务 ${result.task_id}` : ''}`);
    await refreshPipeline();
    switchModule('assets');
  } catch (e) { const d = e.detail || e; showInlineError('资产提交失败', typeof d === 'string' ? d : JSON.stringify(d)); }
}

/* ── Settings ── */
async function showSettings() {
  let s;
  try { s = await api('/api/settings'); } catch { s = {}; }
  window.__settingsFlags = s;
  const secretStatus = (has, masked) => {
    if (has) return '<span class="secret-status ok">已配置</span>';
    if (masked) return '<span class="secret-status err">占位符无效</span>';
    return '<span class="secret-status">未配置</span>';
  };
  const secretPlaceholder = (has, masked) => {
    if (has) return '已配置，留空不变；粘贴新 Key 可替换';
    if (masked) return '当前只有星号占位符，请粘贴完整真实 Key';
    return '粘贴完整 API Key';
  };
  const secretField = (id, label, has, masked) => `
    <div class="secret-field-head">
      <label for="${id}">${label}</label>${secretStatus(has, masked)}
    </div>
    <input id="${id}" type="password" autocomplete="off" value="" placeholder="${esc(secretPlaceholder(has, masked))}">
    ${masked ? '<div class="field-warning">配置文件里只有旧脱敏占位符，不是真实 Key。请重新粘贴完整 Key 后保存。</div>' : ''}
  `;
  const root = document.getElementById('modal-root');
  root.style.display = 'flex';
  root.innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <h2 id="settings-title">API 设置</h2>
        ${secretField('s-vidu', 'Vidu API Key', s._has_vidu, s._masked_vidu)}
        ${secretField('s-wetoken', 'Wetoken API Key', s._has_wetoken, s._masked_wetoken)}
        ${secretField('s-idealab', 'IdeaLAB API Key', s._has_idealab, s._masked_idealab)}
        <label for="s-base">IdeaLAB Base URL</label><input id="s-base" value="${esc(s.idealab_base_url || '')}">
        <label for="s-provider">LLM Provider</label>
        <select id="s-provider" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r2)">
          <option value="idealab" ${s.llm_provider==='idealab'?'selected':''}>IdeaLAB (Claude)</option>
          <option value="deepseek" ${s.llm_provider==='deepseek'?'selected':''}>DeepSeek</option>
        </select>
        ${secretField('s-ds', 'DeepSeek API Key', s._has_deepseek, s._masked_deepseek)}
        <label for="s-ds-base">DeepSeek Base URL</label><input id="s-ds-base" value="${esc(s.deepseek_base_url || '')}">
        <label for="s-ds-model">DeepSeek Model</label><input id="s-ds-model" value="${esc(s.deepseek_model || '')}">
        ${secretField('s-gh-token', 'GitHub Token（可选，本地参考图需要公网上传时使用）', s._has_gh, s._masked_gh)}
        <label for="s-gh-owner">GitHub Owner</label><input id="s-gh-owner" value="${esc(s.gh_owner || '')}">
        <label for="s-gh-repo">GitHub Repo</label><input id="s-gh-repo" value="${esc(s.gh_repo || '')}">
        <div class="modal-acts">
          <button class="btn" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="saveSettings()">保存</button>
        </div>
      </div>
    </div>
  `;
}

function closeModal() { document.getElementById('modal-root').style.display = 'none'; }

async function saveSettings() {
  const flags = window.__settingsFlags || {};
  const secretValue = (id, maskedFlag) => {
    const value = document.getElementById(id).value.trim();
    if (value) return value;
    return maskedFlag ? '' : undefined;
  };
  const body = {
    idealab_base_url: document.getElementById('s-base').value,
    llm_provider: document.getElementById('s-provider').value,
    deepseek_base_url: document.getElementById('s-ds-base').value,
    deepseek_model: document.getElementById('s-ds-model').value,
    gh_owner: document.getElementById('s-gh-owner').value,
    gh_repo: document.getElementById('s-gh-repo').value,
  };
  const secrets = {
    vidu_api_key: secretValue('s-vidu', flags._masked_vidu),
    wetoken_api_key: secretValue('s-wetoken', flags._masked_wetoken),
    idealab_api_key: secretValue('s-idealab', flags._masked_idealab),
    deepseek_api_key: secretValue('s-ds', flags._masked_deepseek),
    gh_token: secretValue('s-gh-token', flags._masked_gh),
  };
  for (const [key, value] of Object.entries(secrets)) {
    if (value !== undefined) body[key] = value;
  }
  try {
    await api('/api/settings', { method: 'PUT', body });
    closeModal();
    await checkLLMConfig();
    if (currentProject) {
      await loadPreflight();
      updateDecomposeButton();
      renderActiveModule();
    }
  } catch (e) { alert('保存失败: ' + (e.detail || e)); }
}

init();
