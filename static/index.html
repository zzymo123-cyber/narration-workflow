<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解说漫工作台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;--bg2:#fff;--bg3:#f1f3f5;
  --text:#1a1d23;--text2:#5f6672;--text3:#9ca3af;
  --accent:#4f6ef7;--accent2:#3b5bdb;--accent-light:#eef2ff;
  --ok:#16a34a;--ok-bg:#f0fdf4;--ok-border:#bbf7d0;
  --warn:#d97706;--warn-bg:#fffbeb;--warn-border:#fde68a;
  --err:#dc2626;--err-bg:#fef2f2;--err-border:#fecaca;
  --border:#e5e7eb;--border2:#d1d5db;
  --r:8px;--r2:6px;
  --mono:'SF Mono','Cascadia Code','Consolas',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.06);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;line-height:1.5}
button{cursor:pointer;font-family:inherit}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
input,textarea,select{font-family:inherit;font-size:inherit}

/* ── Header ── */
#hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:44px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#hdr h1{font-size:15px;font-weight:600;color:var(--accent);white-space:nowrap}
#hdr .project-name{font-size:13px;color:var(--text2);padding:3px 10px;border-radius:var(--r2);background:var(--bg3);cursor:pointer;white-space:nowrap;border:1px solid transparent;max-width:260px;overflow:hidden;text-overflow:ellipsis}
#hdr .project-name:hover{color:var(--accent)}
#hdr .llm-status{font-size:11px;padding:2px 8px;border-radius:10px;display:flex;align-items:center;gap:4px;white-space:nowrap;cursor:pointer;border:1px solid transparent}
#hdr .llm-status.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-border)}
#hdr .llm-status.err{background:var(--err-bg);color:var(--err);border:1px solid var(--err-border)}
#hdr .llm-status.unk{background:var(--bg3);color:var(--text3)}
#hdr .spacer{flex:1}
#hdr button{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:var(--r2);font-size:12px}
#hdr button:hover{background:var(--bg3);color:var(--accent);border-color:var(--accent)}

/* ── App shell ── */
#main{display:flex;flex:1;overflow:hidden}
#app-nav{width:184px;background:var(--bg2);border-right:1px solid var(--border);padding:12px 10px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.nav-section-title{font-size:11px;font-weight:600;color:var(--text3);padding:4px 8px 8px}
.nav-item{width:100%;border:1px solid transparent;background:transparent;border-radius:var(--r2);padding:8px 9px;text-align:left;color:var(--text2);display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-light);border-color:var(--accent-muted);color:var(--accent)}
.nav-meta{font-size:10px;color:var(--text3);white-space:nowrap}
.nav-item.active .nav-meta{color:var(--accent)}
.col-header{padding:10px 14px;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.col-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* Main workspace */
#col-mid{flex:1;min-width:360px;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
#main.detail-enabled #col-mid{flex:0 0 clamp(300px,30vw,430px);min-width:300px}
.module-head{min-height:74px;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.module-kicker{font-size:11px;color:var(--text3);margin-bottom:2px}
.module-head h2{font-size:18px;line-height:1.25;font-weight:650;margin:0}
.module-desc{font-size:12px;color:var(--text2);margin-top:3px}
.module-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.module-body{flex:1;min-height:0;overflow:hidden;padding:14px;display:flex;flex-direction:column;gap:10px}
.module-surface{display:none;min-height:0;flex:1}
.module-surface.active{display:flex;flex-direction:column}
.list-surface{overflow:hidden}
.hidden-legacy{display:none!important}
.script-layout{display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:14px;min-height:0;flex:1}
.script-editor,.script-side{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;min-height:0}
.script-editor{display:flex;flex-direction:column}
.script-editor textarea{flex:1;min-height:420px}
.script-side{display:flex;flex-direction:column;gap:10px;height:max-content}
.config-note{font-size:11px;color:var(--text3);line-height:1.5;border-top:1px solid var(--border);padding-top:10px}
.module-summary{font-size:12px;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);padding:9px 10px;line-height:1.6}
.module-summary b{color:var(--text);font-weight:650}
.decompose-card{border:1px solid var(--border);background:var(--bg2);border-radius:var(--r2);padding:8px 9px;margin-top:8px;display:flex;flex-direction:column;gap:6px}
.decompose-card.running{border-color:var(--warn-border);background:var(--warn-bg)}
.decompose-card.completed{border-color:var(--ok-border);background:var(--ok-bg)}
.decompose-card.failed{border-color:var(--err-border);background:var(--err-bg)}
.decompose-head{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12px;font-weight:600;color:var(--text)}
.decompose-msg{font-size:11px;color:var(--text2)}
.decompose-bar{height:6px;background:rgba(255,255,255,.72);border:1px solid var(--border);border-radius:999px;overflow:hidden}
.decompose-fill{height:100%;background:var(--accent);transition:width .2s ease}
.decompose-card.completed .decompose-fill{background:var(--ok)}
.decompose-card.failed .decompose-fill{background:var(--err)}
.decompose-meta{font-size:10px;color:var(--text3);display:flex;justify-content:space-between;gap:8px}
.mid-tab{padding:4px 10px;cursor:pointer;border-radius:var(--r2);font-size:12px;font-weight:600;transition:all .12s;border:0;background:transparent;color:var(--text2)}
.mid-tab:hover{background:var(--accent-light);color:var(--accent)}
.mid-tab.active{background:var(--accent);color:#fff}

/* Asset library cards */
.asset-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.asset-card h3{font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.asset-card h3 .count{font-size:11px;font-weight:400;color:var(--text3)}
.asset-item{font-size:12px;padding:6px 8px;border-radius:var(--r2);margin-bottom:4px;line-height:1.4}
.asset-item.char{background:var(--warn-bg);border:1px solid #fde68a;color:#92400e}
.asset-item.scene{background:#dbeafe;border:1px solid #93c5fd;color:#1e40af}
.asset-item.prop{background:#fce7f3;border:1px solid #f9a8d4;color:#9d174d}
.asset-item b{margin-right:4px}
.asset-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:7px 8px;border-radius:var(--r2);margin-bottom:5px;font-size:12px;line-height:1.4}
.asset-row .asset-main{min-width:0}
.asset-row .asset-name{font-weight:600;margin-bottom:2px}
.asset-row .asset-seed{color:var(--text2)}
.asset-row .asset-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:150px}
.asset-thumb{width:44px;height:56px;object-fit:cover;border:1px solid var(--border);border-radius:var(--r2);background:var(--bg3)}
.asset-thumb-btn{border:0;background:transparent;padding:0;border-radius:var(--r2);line-height:0}
.asset-thumb-btn:hover .asset-thumb{border-color:var(--accent)}

/* Right column: board detail */
#col-right{width:420px;min-width:340px;background:var(--bg2);display:none;flex-direction:column;overflow:hidden;flex-shrink:0}
#main.detail-enabled #col-right{display:flex}
#main.detail-enabled #col-right{flex:1 1 auto;width:auto;min-width:520px}
.board-toolbar{position:sticky;top:-12px;z-index:3;background:var(--bg2);border-bottom:1px solid var(--border);margin:-12px -14px 12px;padding:9px 14px;display:flex;flex-direction:column;gap:8px}
.board-toolbar-main{display:flex;align-items:center;justify-content:space-between;gap:8px}
.board-toolbar-title{font-size:12px;font-weight:650;color:var(--text)}
.board-toolbar-meta{font-size:11px;color:var(--text3)}
.board-nav{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.board-nav .btn{padding:3px 9px}
.primary-media{border:1px solid var(--border);border-radius:var(--r);background:var(--bg);padding:10px;margin-bottom:12px}
.primary-media-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.primary-media-title{font-size:12px;font-weight:650;color:var(--text2);display:flex;align-items:center;gap:6px}
.primary-media img,.primary-media video{display:block;width:100%;max-height:58vh;object-fit:contain;border-radius:var(--r2);background:#0f172a;border:1px solid var(--border)}
.secondary-media{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.media-placeholder{min-height:220px;border:1px dashed var(--border2);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;text-align:center;color:var(--text3);background:var(--bg2);font-size:12px}
.board-summary{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:12px}
.board-summary-row{border:1px solid var(--border);border-radius:var(--r2);background:var(--bg2);padding:8px 9px}
.board-summary-title{font-size:11px;font-weight:650;color:var(--text3);margin-bottom:4px}
.board-summary-text{font-size:12px;color:var(--text2);line-height:1.45}
.source-compare-panel{border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);margin-bottom:12px;overflow:hidden}
.source-compare-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:9px 10px;border-bottom:1px solid var(--border);background:var(--bg)}
.source-compare-title{font-size:12px;font-weight:650;color:var(--text)}
.source-compare-meta{font-size:11px;color:var(--text3);margin-top:1px}
.source-compare-grid{display:grid;grid-template-columns:1fr 1fr 1.25fr;border-bottom:1px solid var(--border)}
.source-compare-col{min-width:0;border-right:1px solid var(--border)}
.source-compare-col:last-child{border-right:0}
.source-col-title{font-size:10px;font-weight:650;text-transform:uppercase;letter-spacing:.3px;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border);padding:5px 7px}
.source-item{padding:7px;border-bottom:1px solid var(--border);font-size:12px;line-height:1.45}
.source-item:last-child{border-bottom:0}
.source-item-meta{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:3px}
.source-item-text{color:var(--text);white-space:pre-wrap;word-break:break-word}
.source-item-sub{font-size:10px;color:var(--text3);margin-top:3px}
.source-review-foot{padding:7px 9px;font-size:11px;color:var(--text2);line-height:1.5;background:var(--bg2)}
.source-review-foot .danger-text{font-weight:500}
.history-list{display:flex;flex-direction:column;gap:6px;padding:7px}
.history-item{border:1px solid var(--border);border-radius:var(--r2);background:var(--bg);padding:7px 8px;font-size:11px;color:var(--text2);line-height:1.45}
.history-item-main{display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:650;color:var(--text)}
.history-item-meta{margin-top:3px;word-break:break-all}
.detail-fold{border:1px solid var(--border);border-radius:var(--r2);background:var(--bg2);padding:0 9px;margin-bottom:10px}
.detail-fold summary{font-weight:600;padding:8px 0}
.detail-fold .bd-section{margin-bottom:9px}
.episode-label{font-size:11px;font-weight:650;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:6px 8px;margin-top:2px}
.episode-label:first-child{margin-top:0}
.video-mode-tabs{display:flex;align-items:center;gap:4px;border:1px solid var(--border);background:var(--bg2);border-radius:var(--r2);padding:2px}
.video-mode-tabs button{border:0;background:transparent;color:var(--text2);border-radius:4px;padding:4px 8px;font-size:12px;font-weight:600}
.video-mode-tabs button.active{background:var(--accent);color:#fff}
.episode-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 11px;text-align:left;width:100%;display:flex;flex-direction:column;gap:8px}
.episode-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-light)}
.episode-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.episode-title{font-size:13px;font-weight:650;color:var(--text)}
.episode-meta{font-size:11px;color:var(--text3);margin-top:2px}
.episode-progress{height:6px;border-radius:999px;background:var(--bg3);overflow:hidden}
.episode-progress div{height:100%;background:var(--ok)}
.episode-timeline{display:flex;gap:4px;flex-wrap:wrap}
.episode-part{border:1px solid var(--border);background:var(--bg2);border-radius:4px;padding:3px 6px;font-size:10px;color:var(--text2)}
.episode-part.done{border-color:var(--ok-border);background:var(--ok-bg);color:#166534}
.episode-part.fail{border-color:var(--err-border);background:var(--err-bg);color:#991b1b}
.episode-part.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.storyboard-episode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.storyboard-thumb-card{border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);padding:8px;text-align:left;color:var(--text);display:flex;flex-direction:column;gap:7px;min-width:0}
.storyboard-thumb-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.storyboard-thumb-card.active{border-color:var(--accent);background:var(--accent-light)}
.storyboard-thumb-media{aspect-ratio:9/16;border:1px solid var(--border);border-radius:var(--r2);background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--text3);font-size:11px;text-align:center}
.storyboard-thumb-media img{width:100%;height:100%;object-fit:contain;background:#f8fafc}
.storyboard-thumb-title{font-size:12px;font-weight:650;display:flex;align-items:center;justify-content:space-between;gap:6px}
.storyboard-thumb-source{font-size:11px;color:var(--text2);line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.storyboard-episode-toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.storyboard-episode-stats{font-size:12px;color:var(--text2)}
.voice-select-row{display:flex;align-items:center;gap:6px;min-width:210px}
.voice-select-row label{white-space:nowrap}
.voice-select-row select{min-width:110px;height:28px;padding:3px 7px;font-size:12px}
@media (max-width:980px){
  #main.detail-enabled #col-mid{flex-basis:280px;min-width:280px}
  #main.detail-enabled #col-right{min-width:420px}
  .source-compare-grid{grid-template-columns:1fr}
  .source-compare-col{border-right:0;border-bottom:1px solid var(--border)}
  .source-compare-col:last-child{border-bottom:0}
}

/* ── Form elements ── */
label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
textarea{resize:vertical;min-height:140px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r2);font-size:13px;outline:none;background:var(--bg2);line-height:1.6}
textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light)}
select{padding:6px 8px;border:1px solid var(--border);border-radius:var(--r2);font-size:13px;background:var(--bg2);outline:none}
select:focus{border-color:var(--accent)}

.btn{padding:6px 14px;border-radius:var(--r2);font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--bg2);color:var(--text2);transition:all .12s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn:disabled{background:var(--bg3);color:var(--text3);border-color:var(--border);cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{background:var(--bg3);color:var(--text3);border-color:var(--border);cursor:not-allowed}
.btn-sm{padding:3px 10px;font-size:11px}

/* ── Error card ── */
.error-card{background:var(--err-bg);border:1px solid var(--err-border);border-radius:var(--r);padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.error-card .ec-title{font-size:13px;font-weight:600;color:var(--err)}
.error-card .ec-reason{font-size:12px;color:#7f1d1d}
.error-card .ec-reason li{margin-left:16px}
.error-card .ec-raw{font-size:11px;color:var(--text3);font-family:var(--mono);word-break:break-all}
.error-card .ec-toggle{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:underline}
.error-card .ec-json-ctx{font-family:var(--mono);font-size:11px;background:#1e1e2e;color:#cdd6f4;padding:8px 10px;border-radius:var(--r2);white-space:pre;overflow-x:auto;line-height:1.5;margin-top:4px}
.error-card .ec-json-ctx .err-line{color:#f38ba8;font-weight:600}
.error-card .ec-issues{font-size:12px;color:#7f1d1d}
.error-card .ec-issues li{margin-left:16px}
.error-card .ec-debug-path{font-size:11px;color:var(--text3);font-family:var(--mono)}
.warn-card{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--r);padding:10px 12px;font-size:12px;color:#92400e}

/* ── Segment cards ── */
.seg-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:all .12s;text-align:left;width:100%;color:var(--text);display:block}
.seg-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.seg-card.active{border-color:var(--accent);background:var(--accent-light)}
.seg-card .sc-id{font-size:13px;font-weight:600}
.seg-card .sc-meta{font-size:11px;color:var(--text2);margin-top:2px}
.seg-card .sc-boards{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.seg-card .sc-board-chip{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--bg3);color:var(--text3)}
.seg-card .sc-board-chip.done{background:var(--ok-bg);color:var(--ok)}
.seg-card .sc-board-chip.running{background:var(--warn-bg);color:var(--warn)}
.seg-card .sc-board-chip.fail{background:var(--err-bg);color:var(--err)}

/* ── Board detail ── */
.bd-section{margin-bottom:14px}
.bd-section h4{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.bd-section h4 .badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
.badge-ok{background:var(--ok-bg);color:var(--ok)}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-err{background:var(--err-bg);color:var(--err)}
.danger-text{color:var(--err)}
.badge-muted{background:var(--bg3);color:var(--text3)}

/* Timeline tables */
.tl-table{width:100%;border-collapse:collapse;font-size:11px}
.tl-table th{text-align:left;padding:5px 6px;background:var(--bg3);color:var(--text2);font-weight:500;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.3px}
.tl-table td{padding:5px 6px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.4}
.tl-table .time{font-family:var(--mono);color:var(--accent);white-space:nowrap;font-size:11px}
.tl-table .narrator{color:var(--accent);font-weight:500}
.tl-table .dialogue{color:#7c3aed;font-weight:500}

/* Shot grid */
.shot-grid{font-size:11px;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.shot-row{display:grid;grid-template-columns:44px 52px 1fr 1fr;border-bottom:1px solid var(--border)}
.shot-row:last-child{border-bottom:none}
.shot-row .sh-hdr{background:var(--bg3);font-weight:500;color:var(--text2);padding:5px 6px;font-size:10px}
.shot-row .sh-cell{padding:5px 6px}
.shot-row .sh-time{font-family:var(--mono);color:var(--accent);white-space:nowrap}
.shot-row .sh-sub{font-size:10px;color:var(--text3)}

/* Prompt preview */
.prompt-box{background:#1e1e2e;color:#cdd6f4;padding:10px;border-radius:var(--r2);font-family:var(--mono);font-size:11px;white-space:pre-wrap;max-height:260px;overflow-y:auto;line-height:1.5}
.prompt-editor{border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);padding:10px;margin-bottom:12px}
.prompt-editor-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.prompt-editor-title{font-size:12px;font-weight:650;color:var(--text)}
.prompt-editor-note{font-size:11px;color:var(--text3);line-height:1.45;margin-top:2px}
.prompt-editor textarea{width:100%;min-height:220px;font-family:var(--mono);font-size:11px;line-height:1.55;background:#fbfbfd}
.prompt-editor-actions{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:8px;flex-wrap:wrap}
details summary{font-size:12px;color:var(--text2);cursor:pointer;padding:4px 0;user-select:none}
details summary:hover{color:var(--accent)}

/* Asset chips */
.asset-list{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.asset-chip{font-size:10px;padding:1px 7px;border-radius:3px}
.asset-chip.char{background:#fef3c7;color:#92400e}
.asset-chip.scene{background:#dbeafe;color:#1e40af}
.asset-chip.prop{background:#fce7f3;color:#9d174d}

/* Action row */
.action-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 12px}

.workflow-panel{border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);padding:10px 12px;display:flex;flex-direction:column;gap:9px}
.workflow-title{font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;justify-content:space-between;gap:8px}
.workflow-steps{display:grid;grid-template-columns:1fr;gap:6px}
.wf-step{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--border);border-radius:var(--r2);padding:7px 8px;background:var(--bg)}
.wf-step-main{min-width:0}
.wf-step-name{font-size:12px;font-weight:600}
.wf-step-meta{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-pill{font-size:10px;padding:1px 7px;border-radius:999px;border:1px solid var(--border);white-space:nowrap;color:var(--text2);background:var(--bg2)}
.status-pill.ok{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-border)}
.status-pill.warn{color:var(--warn);background:var(--warn-bg);border-color:var(--warn-border)}
.status-pill.err{color:var(--err);background:var(--err-bg);border-color:var(--err-border)}
.ref-note{font-size:11px;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);padding:7px 8px;margin-top:6px}
.ref-note.err{background:var(--warn-bg);border-color:var(--warn-border);color:#92400e}
.field-warning{font-size:11px;color:#92400e;background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--r2);padding:6px 8px;margin-top:4px}
.secret-field-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px}
.secret-field-head label{margin:0}
.secret-status{font-size:10px;padding:1px 7px;border-radius:999px;border:1px solid var(--border);color:var(--text2);background:var(--bg3);white-space:nowrap}
.secret-status.ok{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-border)}
.secret-status.err{color:var(--err);background:var(--err-bg);border-color:var(--err-border)}
.project-list{border:1px solid var(--border);border-radius:var(--r);margin-top:12px;overflow:hidden}
.project-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 10px;border-bottom:1px solid var(--border);background:var(--bg2)}
.project-row:last-child{border-bottom:0}
.project-row-main{min-width:0}
.project-row-name{font-size:13px;font-weight:600}
.project-row-meta{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:13px;gap:8px;padding:40px}

/* Settings modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border-radius:var(--r);padding:20px;width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h2{font-size:16px;margin-bottom:14px}
.modal label{display:block;font-size:11px;font-weight:500;color:var(--text3);margin-bottom:3px;margin-top:10px}
.modal input,.modal select,.modal textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r2);font-size:13px;outline:none}
.modal input:focus,.modal textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light)}
.modal .modal-acts{margin-top:18px;display:flex;gap:8px;justify-content:flex-end}
.media-modal{width:min(920px,calc(100vw - 32px));height:min(88vh,860px);display:flex;flex-direction:column;gap:10px;padding:14px}
.media-modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--border);padding-bottom:8px}
.media-modal-title{font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.media-modal-body{min-height:0;flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:auto}
.media-modal-body img,.media-modal-body video{max-width:100%;max-height:100%;object-fit:contain}
.media-open-button{display:block;width:100%;border:0;background:transparent;padding:0;cursor:zoom-in}
.media-open-button img{display:block;width:100%;max-height:58vh;object-fit:contain;border-radius:var(--r2);background:#0f172a;border:1px solid var(--border)}

.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@media (max-width: 900px){
  body{height:auto;min-height:100vh;overflow:auto}
  #hdr{height:auto;min-height:44px;flex-wrap:wrap;padding:8px 12px}
  #hdr .spacer{display:none}
  #hdr .project-name{max-width:100%}
  #main{flex-direction:column;overflow:visible}
  #app-nav{width:100%;border-right:0;border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(3,minmax(0,1fr));padding:8px}
  .nav-section-title{display:none}
  .nav-item{font-size:12px}
  #col-mid,#col-right{width:100%;min-width:0;min-height:0;border-right:0;border-bottom:1px solid var(--border);overflow:visible}
  #col-mid,#col-right{height:auto}
  .module-head{flex-direction:column}
  .module-body{overflow:visible}
  .script-layout{grid-template-columns:1fr}
  .col-body{max-height:none;overflow:visible}
  .modal-bg{align-items:flex-start;padding:16px}
  .modal{width:100%;max-width:520px;max-height:calc(100vh - 32px)}
  .shot-row{grid-template-columns:42px 50px minmax(0,1fr)}
  .shot-row .sh-cell:nth-child(4),.shot-row .sh-hdr:nth-child(4){grid-column:3}
}
</style>
</head>
<body>

<div id="hdr">
  <h1>解说漫工作台</h1>
  <button class="project-name" id="project-label" onclick="showProjectModal()">未打开项目</button>

  <div class="spacer"></div>

</div>

<div id="main">
  <aside id="app-nav" aria-label="主导航">
    <div class="nav-section-title">项目流程</div>
    <button class="nav-item active" id="nav-overview" onclick="switchModule('overview')">
      <span>总览</span><span class="nav-meta" id="nav-overview-meta">状态</span>
    </button>

      <span>故事脚本</span><span class="nav-meta" id="nav-script-meta">文本</span>
    </button>
    <button class="nav-item" id="nav-assets" onclick="switchModule('assets')">

  <section id="col-mid" class="module-workspace">

        <div class="module-kicker" id="module-kicker">Production</div>

      </div>

      <button id="tab-segments" class="mid-tab active hidden-legacy" onclick="switchMidTab('segments')" role="tab" aria-selected="true">段落</button>
      <button id="tab-assets" class="mid-tab hidden-legacy" onclick="switchMidTab('assets')" role="tab" aria-selected="false">资产库</button>
    </div>
    <div class="module-body">
      <div id="error-area"></div>

      <section class="module-surface active" id="surface-overview">
        <div id="workflow-panel" class="workflow-panel"></div>
      </section>

      <section class="module-surface" id="surface-script">
        <div class="script-layout">
          <div class="script-editor">
            <label>故事/大纲文本</label>
            <textarea id="inp-text" placeholder="输入故事、大纲、或一个想法..."></textarea>
          </div>
          <aside class="script-side">

              <option value="third_person">第三人称旁白</option>
              <option value="first_person">第一人称旁白</option>
            </select>

            <button class="btn" onclick="runScriptPlan()" id="btn-plan-script">重新规划声音</button>

        </div>

  </section>

  <!-- Right: Board detail -->

    <div class="col-header" id="right-header">Board 详情</div>
    <div class="col-body" id="right-body">
      <div class="empty-state">选择左侧段落中的 Board 查看详情</div>
    </div>

</div>

<div id="modal-root" style="display:none"></div>

<script>
const API = '';
let currentProject = null;
let pipelineData = null;
let currentSegKey = null;
let currentBoardIdx = null;
let llmHealth = null;
let currentPreflight = null;
let activeModule = 'overview';
let decomposePoller = null;

async function api(path, opts = {}) {
  let r;
  try {
    r = await fetch(API + path, {
      headers: opts.body ? { 'Content-Type': 'application/json' } : undefined,
      ...opts,
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
  } catch (e) {
    throw { detail: '网络请求失败: 服务器可能未启动或不可达 (http://localhost:8003)' };
  }
  if (!r.ok) {
    let detail;
    try { detail = await r.json(); } catch { detail = { detail: r.statusText }; }
    throw detail;
  }
  return r.json();
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function projectDir() {
  return pipelineData?.project_dir || currentPreflight?.project_dir || '';
}
function mediaSrc(info) {
  if (!info) return '';
  const local = info.local_path || '';
  const dir = projectDir();
  if (local && dir && local.startsWith(dir + '/')) {
    const rel = local.slice(dir.length + 1);
    const version = info.task_id ? `&v=${encodeURIComponent(info.task_id)}` : '';
    return `/api/asset-file?project_path=${encodeURIComponent(dir)}&file_path=${encodeURIComponent(rel)}${version}`;
  }
  return info.url || '';
}
function mediaLink(info, label, className = '') {
  const src = mediaSrc(info);
  if (!src) return '';
  const cls = ` class="${className || 'btn btn-sm'}"`;
  return `<button type="button"${cls} onclick='showMediaModal(${JSON.stringify(src)}, ${JSON.stringify(label)}, ${JSON.stringify(label.includes("视频") ? "video" : "image")})'>${label}</button>`;
}
function mediaOpenImage(src, title, alt) {
  if (!src) return '';
  return `<button type="button" class="media-open-button" onclick='showMediaModal(${JSON.stringify(src)}, ${JSON.stringify(title)}, "image")'><img src="${esc(src)}" alt="${esc(alt || title)}"></button>`;
}
function boardDisplay(board, fallbackIndex = 0) {
  if (board?.display_id) return board.display_id;
  const page = Number(board?.global_board_index || board?.page || fallbackIndex + 1);
  return `P${String(page).padStart(3, '0')}`;
}
function showMediaModal(src, title = '媒体预览', type = 'image') {
  const root = document.getElementById('modal-root');
  root.style.display = 'flex';
  const media = type === 'video'
    ? `<video src="${esc(src)}" controls autoplay></video>`
    : `<img src="${esc(src)}" alt="${esc(title)}">`;
  root.innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal media-modal" role="dialog" aria-modal="true" aria-labelledby="media-modal-title">
        <div class="media-modal-head">
          <div id="media-modal-title" class="media-modal-title">${esc(title)}</div>
          <button class="btn btn-sm" onclick="closeModal()">关闭</button>
        </div>
        <div class="media-modal-body">${media}</div>
      </div>
    </div>
  `;
}
function chineseCount(text) {
  return Array.from(text || '').filter(ch => (ch >= '\u4e00' && ch <= '\u9fff') || (ch >= '\u3400' && ch <= '\u4dbf')).length;
}
function requiredBeatSeconds(beat) {
  const count = chineseCount(beat?.text || '');
  const speed = beat?.type === 'dialogue' ? 3 : 4.5;
  return Math.max(1, Math.ceil(count / speed));
}
function voiceTimingInfo(board) {
  const issues = [];
  let planned = 0;
  let required = 0;
  for (const beat of board?.voice_timeline || []) {
    const duration = Number(beat.duration ?? ((beat.end ?? 0) - (beat.start ?? 0)));
    const need = requiredBeatSeconds(beat);
    planned += Number.isFinite(duration) ? duration : 0;
    required += need;
    if (duration < need) {
      issues.push(`${beat.beat_id || 'beat'} 规划 ${duration}s，至少需要 ${need}s`);
    }
  }
  const boardDuration = Number(board?.board_duration || 0);
  if (required > boardDuration) {
    issues.push(`本板声音至少需要 ${required}s，超过 board_duration ${boardDuration}s`);
  }
  return { planned, required, boardDuration, issues };
}
function segmentSortKey(key) {
  const nums = (key.match(/\d+/g) || []).map(n => Number(n));
  return { nums, key };
}
function sortSegmentKeys(keys) {
  return keys.sort((a, b) => {
    const ak = segmentSortKey(a);
    const bk = segmentSortKey(b);
    const len = Math.max(ak.nums.length, bk.nums.length);
    for (let i = 0; i < len; i++) {
      const av = ak.nums[i] ?? -1;
      const bv = bk.nums[i] ?? -1;
      if (av !== bv) return av - bv;
    }
    return ak.key.localeCompare(bk.key);
  });
}

let videoView = 'episodes';
let currentEpisode = 1;
let storyboardView = 'episodes';
let currentStoryboardEpisode = 1;
let storyboardDetailMode = 'episode';

/* ── Init ── */
async function init() {
  await checkLLMConfig();
  updateDecomposeButton();
  renderActiveModule();
}

async function checkLLMConfig() {
  try {
    const cfg = await api('/api/llm/config');
    const badge = document.getElementById('llm-badge');
    const info = document.getElementById('llm-config-info');
    badge.className = 'llm-status ' + (cfg.has_api_key ? 'ok' : 'err');
    badge.textContent = cfg.has_api_key ? `LLM: ${cfg.provider} / ${cfg.model}` : `LLM: ${cfg.provider} 未配置`;
    info.innerHTML = `Provider: <b>${esc(cfg.provider)}</b> | Model: <b>${esc(cfg.model)}</b><br>Base: ${esc(cfg.base_url)} | Key: ${cfg.has_api_key ? '***' + esc(cfg.api_key_tail) : '<span style=color:var(--err)>未配置</span>'}`;
    if (cfg.has_api_key) {
      badge.textContent = `LLM: ${cfg.provider} · 点击测试`;
    }
    renderActiveModule();
  } catch (e) {
    document.getElementById('llm-badge').className = 'llm-status err';
    document.getElementById('llm-badge').textContent = 'LLM: 配置读取失败';
    renderActiveModule();
  }
}

async function testLLM() {
  const badge = document.getElementById('llm-badge');
  badge.className = 'llm-status unk';
  badge.innerHTML = '<span class="spinner"></span> 测试中...';
  try {
    const r = await api('/api/llm/health', { method: 'POST' });
    llmHealth = r;
    if (r.success) {
      badge.className = 'llm-status ok';
      badge.textContent = `LLM: ${r.provider} OK`;
      clearError();
    } else {
      badge.className = 'llm-status err';
      badge.textContent = `LLM: ${r.error_type}`;
      showError(r.error_type, r.error_message, null, r);
    }
  } catch (e) {
    badge.className = 'llm-status err';
    badge.textContent = 'LLM: 测试失败';
  }
}

/* ── Error display ── */
function showError(errorType, message, rawError, config) {
  const area = document.getElementById('error-area');
  const reasons = {
    auth_failed: ['API Key 无效或已过期', 'settings.json 中 API Key 被脱敏覆盖（含星号）', 'Provider 配置错误：key 和 provider 不匹配', 'Base URL 指向了错误的服务端'],
    no_api_key: ['settings.json 中未填写对应 provider 的 API Key', '环境变量未设置'],
    permission_denied: ['该账号无权访问模型 ' + (config?.model || ''), '需联系管理员开通权限'],
    not_found: ['模型名称拼写错误', 'Base URL 不正确，该端点不存在'],
    connection_error: ['Base URL 不可达', '网络代理或防火墙阻断了请求'],
  };

  if (errorType === 'json_parse_error') {
    const detail = rawError || {};
    const lineno = detail.lineno || '?';
    const colno = detail.colno || '?';
    const pos = detail.pos;
    const ctx = detail.context || '';
    const issues = detail.detected_issues || [];
    const debugFile = detail.debug_file || '';
    const totalChars = detail.total_chars;

    // Highlight the error line in context
    const ctxHtml = ctx
      ? ctx.split('\n').map(line => {
          if (line.startsWith('>>>')) {
            return '<span class="err-line">' + esc(line) + '</span>';
          }
          return esc(line);
        }).join('\n')
      : '';

    area.innerHTML = `
      <div class="error-card">
        <div class="ec-title">LLM 返回不是合法 JSON</div>
        <div class="ec-reason">错误位置：line ${esc(String(lineno))} column ${esc(String(colno))}${pos !== undefined ? ' (char ' + esc(String(pos)) + ')' : ''}</div>
        ${detail.msg ? `<div style="font-size:12px;color:#7f1d1d">错误信息：${esc(detail.msg)}</div>` : ''}
        ${totalChars ? `<div style="font-size:11px;color:var(--text3)">JSON 片段长度: ${esc(String(totalChars))} 字符</div>` : ''}
        ${issues.length ? `<div class="ec-issues">检测到的问题：<ul>${issues.map(i => '<li>' + esc(i) + '</li>').join('')}</ul></div>` : ''}
        ${ctxHtml ? `<details open style="margin-top:6px"><summary>错误附近原文</summary><div class="ec-json-ctx">${ctxHtml}</div></details>` : ''}
        ${debugFile ? `<div class="ec-debug-path" style="margin-top:6px">Debug: ${esc(debugFile)}</div>` : ''}
        ${config ? `<div style="font-size:11px;color:var(--text2);margin-top:4px">当前配置: provider=${esc(config.provider)} model=${esc(config.model)}</div>` : ''}
      </div>
    `;
    return;
  }

  const reasonsList = reasons[errorType] || ['未知错误类型'];
  area.innerHTML = `
    <div class="error-card">
      <div class="ec-title">${esc(errorType === 'auth_failed' ? 'LLM 认证失败' : errorType === 'no_api_key' ? 'API Key 未配置' : message || errorType)}</div>
      <div class="ec-reason">可能原因：<ul>${reasonsList.map(r => '<li>' + esc(r) + '</li>').join('')}</ul></div>
      ${config ? `<div style="font-size:11px;color:var(--text2)">当前配置: provider=${esc(config.provider)} model=${esc(config.model)} base_url=${esc(config.base_url)}</div>` : ''}
      ${rawError ? `<span class="ec-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">显示原始错误</span><div class="ec-raw" style="display:none">${esc(typeof rawError === 'string' ? rawError : JSON.stringify(rawError))}</div>` : ''}
    </div>
  `;
}

function clearError() { document.getElementById('error-area').innerHTML = ''; }

async function openProject(name) {
  if (!name) return;
  try {
    pipelineData = await api(`/api/project/status?project_name=${encodeURIComponent(name)}`);
    currentProject = name;
    currentSegKey = null;
    currentBoardIdx = null;
    document.getElementById('project-label').textContent = name;
    document.getElementById('inp-text').value = pipelineData.source_text || '';
    document.getElementById('inp-style').value = pipelineData.narration_style || 'third_person';
    updateDecomposeButton();
    await loadPreflight();
    updateDecomposeButton();
    renderSegments();
    renderActiveModule();
    clearBoardDetail();
    closeModal();
  } catch (e) {
    const d = e.detail || e;
    showInlineError('打开项目失败', typeof d === 'string' ? d : JSON.stringify(d));
  }
}

async function createProject(name) {
  if (!name) {
    showProjectModal();
    return;
  }
  if (!name) return;
  const text = document.getElementById('inp-text').value.trim();
  const style = document.getElementById('inp-style').value;
  if (!text) { showInlineError('无法创建项目', '请先输入故事文本'); return; }
  try {
    await api('/api/project/create', { method: 'POST', body: { project_name: name, source_text: text, narration_style: style } });
    currentProject = name;
    pipelineData = { project: name, narration_style: style, source_text: text, assets: { characters: {}, scenes: {}, props: {} }, narration_segments: {} };
    document.getElementById('project-label').textContent = name;
    updateDecomposeButton();
    await loadPreflight();
    updateDecomposeButton();
    renderSegments();
    renderActiveModule();
    closeModal();
  } catch (e) {
    const d = e.detail || e;
    showInlineError('创建失败', typeof d === 'string' ? d : JSON.stringify(d));

function updateDecomposeButton() {
  const btn = document.getElementById('btn-decompose');
  const planBtn = document.getElementById('btn-plan-script');
  const resetBtn = document.getElementById('btn-reset-storyboards');
  const hasText = !!document.getElementById('inp-text').value.trim();
  const hasProject = !!currentProject;
  const hasSegments = Object.keys(pipelineData?.narration_segments || {}).length > 0;
  const running = isDecomposeRunning();
  if (planBtn) planBtn.disabled = running || !hasProject || !hasText;
  if (resetBtn) resetBtn.disabled = running || !hasProject || !hasSegments;
  if (!hasProject) {
    btn.textContent = '创建项目';
    btn.disabled = !hasText;
    btn.onclick = () => showProjectModal();
  } else {
    const preflightBlocked = currentPreflight && !currentPreflight.can_decompose;
    btn.textContent = running ? '拆解中...' : (preflightBlocked ? '等待 LLM Key' : (hasSegments ? '重新拆解' : '开始拆解'));
    btn.disabled = running || !hasText || !!preflightBlocked;
    btn.title = preflightBlocked ? '请先在设置中配置当前 LLM Provider 的完整 API Key' : '';
    btn.onclick = runDecompose;
  }
}

document.getElementById('inp-text').addEventListener('input', () => {

/* ── Decompose ── */
async function runDecompose() {
  if (!currentProject) return;
  clearError();
  switchModule('script');
  const btn = document.getElementById('btn-decompose');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 拆解中 (声音规划 + LLM)...';
  startDecomposePolling();
  try {
    const r = await api('/api/project/decompose', {
      method: 'POST',
      body: {
        project_name: currentProject,
        narration_style: document.getElementById('inp-style')?.value || 'third_person',
      }
    });
    pipelineData = await api(`/api/project/status?project_name=${encodeURIComponent(currentProject)}`);
    await loadPreflight();
    document.getElementById('inp-text').value = pipelineData.source_text || '';
    document.getElementById('inp-style').value = pipelineData.narration_style || 'third_person';
    renderSegments();
    if (r.validation_errors && r.validation_errors.length > 0) {
      const area = document.getElementById('error-area');
      area.innerHTML = `<div class="warn-card">拆解完成，但存在校验问题：<br>${r.validation_errors.map(e => esc(e)).join('<br>')}</div>`;
    }
    if (r.stats) {
      const s = r.stats;
      const area = document.getElementById('error-area');
      const scriptText = s.script_boards ? ` · 声音规划 ${s.script_boards} 板/${s.script_estimated_seconds || 0}s` : '';
      area.innerHTML += `<div class="warn-card" style="background:var(--ok-bg);border-color:var(--ok-border);color:#166534">拆解完成：${s.segments} 段 · ${s.boards} 板${scriptText} · ${s.characters} 角色 · ${s.scenes} 场景 · ${s.props} 道具</div>`;
    }
    const keys = sortSegmentKeys(Object.keys(pipelineData.narration_segments || {}));
    if (keys.length) selectSegment(keys[0]);
    switchModule('storyboards');
  } catch (e) {
    const detail = e.detail || e;
    const d = typeof detail === 'string' ? { message: detail } : detail;
    const rawErr = d.error_type === 'json_parse_error' ? d : d.raw_error;
    showError(d.error_type || 'unknown', d.message || d.detail || JSON.stringify(d), rawErr, d.config);
    await refreshDecomposeProgress();
  } finally {
    stopDecomposePolling();
  }
  updateDecomposeButton();
  renderActiveModule();
}

async function runScriptPlan() {
  if (!currentProject) return;
  clearError();
  try {
    await api('/api/project/plan-script', { method: 'POST', body: { project_name: currentProject } });

async function resetStoryboards() {

  const running = isDecomposeRunning();
  const canSubmitAssets = !running && !blockers.some(b => b.includes('Vidu')) && !!assets.needed;
  const canSubmitStoryboards = !running && !blockers.some(b => b.includes('Vidu')) && !!storyboards.needed && !!segCount && refs.missingBoards === 0;
  const canSubmitVideos = !running && !blockers.some(b => b.includes('Wetoken')) && !!videos.needed && storyboards.total > 0 && storyboards.completed === storyboards.total && refs.videoMissingBoards === 0 && refs.timingIssueBoards === 0;
  if (activeModule === 'overview') {
    root.innerHTML = `<button class="btn" onclick="refreshPipeline()">刷新</button>`;
  } else if (activeModule === 'script') {
    const hasText = !!document.getElementById('inp-text')?.value.trim();
    const preflightBlocked = currentPreflight && !currentPreflight.can_decompose;
    const running = isDecomposeRunning();
    const scriptBlocked = running || !currentProject || !hasText || !!preflightBlocked;
    root.innerHTML = `<button class="btn" onclick="runScriptPlan()" ${running || !currentProject || !hasText ? 'disabled' : ''}>规划声音</button><button class="btn btn-primary" onclick="runDecompose()" ${scriptBlocked ? 'disabled' : ''}>${running ? '拆解中...' : '开始拆解'}</button>`;

function statusCounts(items) {
  const counts = { total: items.length, needed: 0, submitted: 0, completed: 0, failed: 0 };
  items.forEach(x => counts[x?.status || 'needed'] = (counts[x?.status || 'needed'] || 0) + 1);
  return counts;
}

function countAssets() {
  const assets = pipelineData?.assets || {};
  const list = [];
  for (const bucket of ['characters', 'scenes', 'props']) {
    for (const info of Object.values(assets[bucket] || {})) list.push(info);
  }
  return statusCounts(list);
}

function boardItems(kind) {
  const items = [];
  for (const seg of Object.values(pipelineData?.narration_segments || {})) {
    for (const b of seg.boards || []) items.push(kind === 'storyboard' ? b.storyboard_image : b.video);
  }
  return items;
}

function allBoardRefs() {
  const items = [];
  const segs = pipelineData?.narration_segments || {};
  for (const segKey of sortSegmentKeys(Object.keys(segs))) {
    const boards = segs[segKey].boards || [];
    boards.forEach((board, idx) => items.push({ segKey, idx, board }));
  }
  items.sort((a, b) => (a.board.page || 0) - (b.board.page || 0));
  return items;
}

function storyboardEpisodeGroups(maxSeconds = 210) {
  const segs = pipelineData?.narration_segments || {};
  const keys = sortSegmentKeys(Object.keys(segs));
  const hasBackendEpisodes = keys.some(key => Number(segs[key]?.episode || 1) > 1);
  const groups = [];
  let current = null;
  keys.forEach(segKey => {
    const seg = segs[segKey] || {};
    const boards = seg.boards || [];
    const duration = boards.reduce((sum, board) => sum + Number(board.board_duration || board.voice_duration || 0), 0);
    const startPage = boards[0]?.page || 1;
    const endPage = boards[boards.length - 1]?.page || startPage;
    if (hasBackendEpisodes) {
      const episodeNo = Number(seg.episode || 1);
      current = groups.find(group => group.episode === episodeNo);
      if (!current) {
        current = { episode: episodeNo, seconds: 0, startPage, endPage, segKeys: new Set() };
        groups.push(current);
      }
    } else if (!current || (current.seconds > 0 && current.seconds + duration > maxSeconds)) {
      current = { episode: groups.length + 1, seconds: 0, startPage, endPage, segKeys: new Set() };
      groups.push(current);
    }
    current.seconds += duration;
    current.startPage = Math.min(current.startPage, startPage);
    current.endPage = Math.max(current.endPage, endPage);
    current.segKeys.add(segKey);
  });
  const bySeg = {};
  groups.forEach(group => group.segKeys.forEach(segKey => {
    if (!bySeg[segKey]) bySeg[segKey] = group;
  }));
  return { groups, bySeg };
}

function workflowReferenceState() {
  const state = { totalBoards: 0, missingBoards: 0, videoMissingBoards: 0, timingIssueBoards: 0, storyboardReady: 0, videoReady: 0 };
  for (const seg of Object.values(pipelineData?.narration_segments || {})) {
    for (const board of seg.boards || []) {
      state.totalBoards += 1;
      const refs = boardReferenceInfo(board);
      const timing = voiceTimingInfo(board);
      const missingRefs = refs.missing.length > 0;
      const videoMissingRefs = refs.videoMissing.length > 0;
      if (missingRefs) state.missingBoards += 1;
      if (videoMissingRefs) state.videoMissingBoards += 1;
      if (timing.issues.length) state.timingIssueBoards += 1;
      if ((board.storyboard_image?.status || 'needed') === 'needed' && !missingRefs) state.storyboardReady += 1;
      if ((board.video?.status || 'needed') === 'needed' && (board.storyboard_image?.status || 'needed') === 'completed' && !videoMissingRefs && !timing.issues.length) state.videoReady += 1;
    }
  }
  return state;
}

function workflowPill(counts) {
  if (!counts.total) return '<span class="status-pill">等待</span>';
  if (counts.failed) return `<span class="status-pill err">${counts.failed} 失败</span>`;
  if (counts.submitted) return `<span class="status-pill warn">${counts.submitted} 生成中</span>`;
  if (counts.completed === counts.total) return '<span class="status-pill ok">完成</span>';
  return `<span class="status-pill">${counts.completed}/${counts.total}</span>`;
}

function scriptPlanSummary() {
  const plan = pipelineData?.script_plan || {};
  const stats = plan.stats || {};
  const boards = (plan.board_plan || []).length;
  return {
    exists: boards > 0,
    boards,
    seconds: stats.estimated_seconds || 0,
    minutes: stats.estimated_minutes || Math.ceil((stats.estimated_seconds || 0) / 60),
    slices: stats.slices || 0,
    errors: plan.coverage_errors || []
  };
}

function decomposeProgress() {
  return pipelineData?._decompose_progress || null;
}

function isDecomposeRunning() {
  return decomposeProgress()?.status === 'running';
}

function decomposeStageLabel(stage) {
  const labels = {
    script_plan: '声音规划',
    assets: '资产提取',
    outline: '段落大纲',
    boards: '故事板拆解',
    done: '完成',
  };
  return labels[stage] || stage || '拆解';
}

function decomposeProgressHtml() {
  const p = decomposeProgress();
  if (!p) return '';
  const status = p.status || 'running';
  const current = Number(p.current || 0);
  const total = Number(p.total || 0);
  const pct = total > 0
    ? Math.max(0, Math.min(100, Math.round((current / total) * 100)))
    : (status === 'completed' ? 100 : status === 'running' ? 10 : 0);
  const pillCls = status === 'completed' ? 'ok' : status === 'failed' ? 'err' : 'warn';
  const pillText = status === 'completed' ? '完成' : status === 'failed' ? '失败' : '进行中';
  const countText = total > 0 ? `${current}/${total}` : decomposeStageLabel(p.stage);
  const errorText = status === 'failed' && p.error_type ? `<div class="decompose-msg">错误类型：${esc(p.error_type)}</div>` : '';
  return `
    <div class="decompose-card ${esc(status)}">
      <div class="decompose-head">
        <span>${esc(decomposeStageLabel(p.stage))}</span>
        <span class="status-pill ${pillCls}">${pillText}</span>
      </div>
      <div class="decompose-msg">${esc(p.message || '')}</div>
      ${errorText}
      <div class="decompose-bar" aria-label="拆解进度"><div class="decompose-fill" style="width:${pct}%"></div></div>
      <div class="decompose-meta"><span>${esc(countText)}</span><span>${esc(p.updated_at || '')}</span></div>
    </div>
  `;
}

async function refreshDecomposeProgress() {
  if (!currentProject) return;
  try {
    pipelineData = await api(`/api/project/status?project_name=${encodeURIComponent(currentProject)}`);
    updateDecomposeButton();
    renderScriptSummary();
    renderWorkflowPanel();
    renderModuleActions();
    if (['assets', 'storyboards', 'videos', 'tasks'].includes(activeModule)) renderMidBody();
  } catch {}
}

function startDecomposePolling() {
  stopDecomposePolling();
  decomposePoller = setInterval(refreshDecomposeProgress, 2000);
}

function stopDecomposePolling() {
  if (decomposePoller) {
    clearInterval(decomposePoller);
    decomposePoller = null;
  }
}

function renderWorkflowPanel() {
  const root = document.getElementById('workflow-panel');
  if (!root) return;

    `;
    return;
  }
  const assets = countAssets();
  const storyboards = statusCounts(boardItems('storyboard'));
  const videos = statusCounts(boardItems('video'));
  const segCount = Object.keys(pipelineData.narration_segments || {}).length;
  const plan = scriptPlanSummary();
  const refs = workflowReferenceState();
  const blockers = currentPreflight?.blockers || [];
  const progress = decomposeProgress();
  const running = progress?.status === 'running';
  const progressHtml = decomposeProgressHtml();
  const blockerHtml = blockers.length
    ? `<div class="ref-note err">${blockers.map(esc).join('<br>')}</div>`
    : '<div class="ref-note">预检通过：当前步骤所需配置和项目数据已就绪。</div>';
  const stageNotes = [];

  if (refs.missingBoards) stageNotes.push(`${refs.missingBoards} 个分镜缺少资产参考图，先生成角色/场景/道具参考图`);
  if (refs.timingIssueBoards) stageNotes.push(`${refs.timingIssueBoards} 个分镜旁白时长不足，需要重新拆板后再生成视频`);
  if (storyboards.total && storyboards.completed < storyboards.total) stageNotes.push('视频生成需要对应分镜板图先完成');
  const stageNoteHtml = stageNotes.length ? `<div class="ref-note">${stageNotes.map(esc).join('<br>')}</div>` : '';
  const canSubmitAssets = !running && !blockers.some(b => b.includes('Vidu')) && !!assets.needed;
  const canSubmitStoryboards = !running && !blockers.some(b => b.includes('Vidu')) && !!storyboards.needed && !!segCount && refs.missingBoards === 0;
  const canSubmitVideos = !running && !blockers.some(b => b.includes('Wetoken')) && !!videos.needed && storyboards.total > 0 && storyboards.completed === storyboards.total && refs.videoMissingBoards === 0 && refs.timingIssueBoards === 0;
  const decomposePill = progress?.status === 'running'
    ? '<span class="status-pill warn">进行中</span>'
    : progress?.status === 'failed'
      ? '<span class="status-pill err">失败</span>'
      : segCount ? '<span class="status-pill ok">完成</span>' : '<span class="status-pill">待拆解</span>';
  root.innerHTML = `
    <div class="workflow-title"><span>生成流程</span><button class="btn btn-sm" onclick="refreshPipeline()">刷新</button></div>
    ${blockerHtml}
    ${stageNoteHtml}
    ${progressHtml}
    <div class="workflow-steps">
      <div class="wf-step"><div class="wf-step-main"><div class="wf-step-name">声音规划</div><div class="wf-step-meta">${plan.exists ? `${plan.boards} 板 · 预计 ${plan.seconds}s / 约 ${plan.minutes} 分钟 · ${plan.slices} 个原文切片` : '先按可朗读时长确定板数'}</div></div>${plan.exists && !plan.errors.length ? '<span class="status-pill ok">完成</span>' : '<span class="status-pill">待规划</span>'}</div>
      <div class="wf-step"><div class="wf-step-main"><div class="wf-step-name">故事拆解</div><div class="wf-step-meta">${progress?.message ? esc(progress.message) : (segCount ? `${segCount} 段已生成` : '生成角色、资产和故事板结构')}</div></div>${decomposePill}</div>
      <div class="wf-step"><div class="wf-step-main"><div class="wf-step-name">角色/场景/道具参考图</div><div class="wf-step-meta">${assets.total ? `${assets.completed}/${assets.total} 已完成` : '拆解后可生成'}</div></div>${workflowPill(assets)}</div>
      <div class="wf-step"><div class="wf-step-main"><div class="wf-step-name">分镜板图</div><div class="wf-step-meta">${storyboards.total ? `${storyboards.completed}/${storyboards.total} 已完成` : '资产就绪后生成'}</div></div>${workflowPill(storyboards)}</div>
      <div class="wf-step"><div class="wf-step-main"><div class="wf-step-name">视频</div><div class="wf-step-meta">${videos.total ? `${videos.completed}/${videos.total} 已完成` : '分镜完成后生成'}</div></div>${workflowPill(videos)}</div>

      <button class="btn" onclick="runScriptPlan()" ${running ? 'disabled' : ''}>重新规划声音</button>

      <button class="btn btn-primary" onclick="submitAllVideos()" ${!canSubmitVideos ? 'disabled' : ''}>生成全部视频</button>

}

function renderAssetsMid() {
  const body = document.getElementById('mid-body');
  const assets = pipelineData?.assets;
  if (!assets) { body.innerHTML = '<div class="empty-state">拆解后资产将显示在这里</div>'; return; }

  const chars = assets.characters || {};
  const scenes = assets.scenes || {};
  const props = assets.props || {};

  if (!Object.keys(chars).length && !Object.keys(scenes).length && !Object.keys(props).length) {
    body.innerHTML = '<div class="empty-state">拆解后资产将显示在这里</div>';
    return;
  }

  let html = '';
  const assetHtml = (type, name, info, cls) => {
    const status = info.status || 'needed';
    const ref = info.url || info.local_path || '';
    const src = mediaSrc(info);
    const thumb = src ? `<button type="button" class="asset-thumb-btn" onclick='showMediaModal(${JSON.stringify(src)}, ${JSON.stringify(name)}, "image")'><img class="asset-thumb" src="${esc(src)}" alt="${esc(name)}"></button>` : '';
    const typeArg = JSON.stringify(type);
    const nameArg = JSON.stringify(name);
    const submitText = status === 'submitted' ? '生成中' : (status === 'completed' ? '重生成' : '生成');
    return `<div class="asset-row ${cls}">
      <div class="asset-main">
        <div class="asset-name">${esc(name)} <span class="status-pill ${status === 'completed' ? 'ok' : status === 'submitted' ? 'warn' : status === 'failed' ? 'err' : ''}">${statusLabel(status)}</span></div>
        <div class="asset-seed">${esc(info.seed || '')}</div>
        ${ref ? `<div style="font-size:10px;color:var(--text3);margin-top:2px">${esc(ref)}</div>` : ''}
      </div>
      <div class="asset-actions">
        ${thumb}
        <button class="btn btn-sm" onclick='showAssetPromptModal(${typeArg}, ${nameArg})' ${status === 'submitted' ? 'disabled' : ''}>编辑</button>
        <button class="btn btn-sm" onclick='submitAsset(${typeArg}, ${nameArg}, null, ${status === 'completed' ? 'true' : 'false'})' ${status === 'submitted' ? 'disabled' : ''}>${submitText}</button>
      </div>
    </div>`;
  };
  if (Object.keys(chars).length) {
    html += '<div class="asset-card" style="margin-bottom:10px"><h3>角色 <span class="count">' + Object.keys(chars).length + '</span></h3>';
    for (const [name, info] of Object.entries(chars)) {
      html += assetHtml('characters', name, info, 'char');
    }
    html += '</div>';
  }
  if (Object.keys(scenes).length) {
    html += '<div class="asset-card" style="margin-bottom:10px"><h3>场景 <span class="count">' + Object.keys(scenes).length + '</span></h3>';
    for (const [name, info] of Object.entries(scenes)) {
      html += assetHtml('scenes', name, info, 'scene');
    }
    html += '</div>';
  }
  if (Object.keys(props).length) {
    html += '<div class="asset-card" style="margin-bottom:10px"><h3>道具 <span class="count">' + Object.keys(props).length + '</span></h3>';
    for (const [name, info] of Object.entries(props)) {
      html += assetHtml('props', name, info, 'prop');
    }
    html += '</div>';
  }
  body.innerHTML = html;
}

function storyboardEpisodePreviewGroups() {
  const base = storyboardEpisodeGroups().groups;
  const bySeg = storyboardEpisodeGroups().bySeg;
  const groups = {};
  base.forEach(group => {
    groups[group.episode] = {
      episode: group.episode,
      title: `第${group.episode}集`,
      seconds: group.seconds || 0,
      startPage: group.startPage,
      endPage: group.endPage,
      parts: [],
      storyboards_total: 0,
      storyboards_completed: 0,
      storyboards_needed: 0,
      storyboards_failed: 0,
    };
  });
  for (const item of allBoardRefs()) {
    const groupInfo = bySeg[item.segKey] || { episode: 1, seconds: 0, startPage: item.board.page || 1, endPage: item.board.page || 1 };
    const epNo = groupInfo.episode || 1;
    if (!groups[epNo]) {
      groups[epNo] = {
        episode: epNo,
        title: `第${epNo}集`,
        seconds: 0,
        startPage: item.board.page || 1,
        endPage: item.board.page || 1,
        parts: [],
        storyboards_total: 0,
        storyboards_completed: 0,
        storyboards_needed: 0,
        storyboards_failed: 0,
      };
    }
    const sb = item.board.storyboard_image || {};
    const status = sb.status || 'needed';
    const source = item.board.review?.source_excerpt || (item.board.source_trace || []).map(x => x.text || '').join('') || item.board.video_goal || '';
    groups[epNo].parts.push({
      ...item,
      page: item.board.global_board_index || item.board.page || item.idx + 1,
      display: boardDisplay(item.board, item.idx),
      duration: Number(item.board.board_duration || item.board.voice_duration || 0),
      status,
      local_path: sb.local_path || '',
      url: sb.url || '',
      task_id: sb.task_id || '',
      source,
    });
    groups[epNo].storyboards_total += 1;
    if (status === 'completed' && (sb.local_path || sb.url)) groups[epNo].storyboards_completed += 1;
    else if (status === 'failed') groups[epNo].storyboards_failed += 1;
    else groups[epNo].storyboards_needed += 1;
  }
  return Object.values(groups).sort((a, b) => a.episode - b.episode);
}

function videoEpisodeGroups() {
  const segs = pipelineData?.narration_segments || {};
  const exports = pipelineData?.episode_exports || {};
  const groups = {};
  const keys = sortSegmentKeys(Object.keys(segs));
  const hasBackendEpisodes = keys.some(key => Number(segs[key]?.episode || 1) > 1);
  let fallbackEpisode = 0;
  let fallbackSeconds = 0;
  for (const segKey of sortSegmentKeys(Object.keys(segs))) {
    const seg = segs[segKey] || {};
    const nums = (segKey.match(/\d+/g) || []).map(Number);
    const segSeconds = (seg.boards || []).reduce((sum, board) => sum + Number(board.board_duration || board.video?.duration || 0), 0);
    let epNo;
    if (hasBackendEpisodes) {
      epNo = Number(seg.episode || nums[0] || 1);
    } else {
      if (!fallbackEpisode || (fallbackSeconds > 0 && fallbackSeconds + segSeconds > 210)) {
        fallbackEpisode += 1;
        fallbackSeconds = 0;
      }
      epNo = fallbackEpisode;
      fallbackSeconds += segSeconds;
    }
    if (!groups[epNo]) {
      groups[epNo] = { episode: epNo, title: `第${epNo}集`, seconds: 0, parts: [], videos_total: 0, videos_completed: 0, missing_parts: [], export: exports[String(epNo)] || {} };
    }
    (seg.boards || []).forEach((board, idx) => {
      const video = board.video || {};
      const duration = Number(board.board_duration || video.duration || 0);
      const done = (video.status || 'needed') === 'completed' && !!video.local_path;
      const part = {
        segment_key: segKey,
        board_index: idx,
        label: `${boardDisplay(board, idx)} · ${segKey} P${idx + 1}`,
        duration,
        video_status: video.status || 'needed',
        local_path: video.local_path || '',
        video_goal: board.video_goal || '',
      };
      groups[epNo].parts.push(part);
      groups[epNo].seconds += duration;
      groups[epNo].videos_total += 1;
      if (done) groups[epNo].videos_completed += 1; else groups[epNo].missing_parts.push(part.label);
    });
  }
  return Object.values(groups).sort((a, b) => a.episode - b.episode).map(g => ({ ...g, can_concat: g.parts.length > 0 && !g.missing_parts.length }));
}

function renderEpisodeList() {
  const body = document.getElementById('mid-body');

  if (!groups.some(g => g.episode === currentEpisode)) currentEpisode = groups[0].episode;
  body.innerHTML = groups.map(group => {
    const pct = group.videos_total ? Math.round(group.videos_completed / group.videos_total * 100) : 0;
    const exportStatus = group.export?.status === 'completed' ? '<span class="status-pill ok">已合成</span>' : (group.can_concat ? '<span class="status-pill ok">可合成</span>' : '<span class="status-pill">缺视频</span>');
    const parts = group.parts.slice(0, 18).map(part => `<span class="episode-part ${part.local_path ? 'done' : part.video_status === 'failed' ? 'fail' : ''}">${esc(part.segment_key.split('_').slice(-1)[0])}-${part.board_index + 1}</span>`).join('');
    return `<button class="episode-card ${group.episode === currentEpisode ? 'active' : ''}" onclick="selectEpisode(${group.episode})">
      <div class="episode-card-head">
        <div><div class="episode-title">${esc(group.title)}</div><div class="episode-meta">${Math.round(group.seconds)}s · ${group.videos_completed}/${group.videos_total} 视频完成</div></div>
        ${exportStatus}
      </div>
      <div class="episode-progress"><div style="width:${pct}%"></div></div>
      <div class="episode-timeline">${parts}${group.parts.length > 18 ? '<span class="episode-part">...</span>' : ''}</div>
    </button>`;
  }).join('');
}

function selectEpisode(episode) {
  currentEpisode = episode;
  renderMidBody();
  renderEpisodeDetail();
}

function renderEpisodeDetail() {
  const groups = videoEpisodeGroups();
  const group = groups.find(g => g.episode === currentEpisode) || groups[0];
  if (!group) { clearBoardDetail(); return; }
  currentEpisode = group.episode;
  document.getElementById('right-header').textContent = `${group.title} 预览`;
  const body = document.getElementById('right-body');
  const exportSrc = group.export?.local_path ? mediaSrc(group.export) : '';
  const playable = group.parts.filter(part => part.local_path);
  const firstPlayable = playable[0]?.local_path || '';
  const media = exportSrc
    ? `<div class="primary-media"><div class="primary-media-head"><div class="primary-media-title">合成成片 <span class="badge badge-ok">已完成</span></div>${mediaLink(group.export, '打开成片')}</div><video src="${esc(exportSrc)}" controls></video></div>`
    : firstPlayable
      ? `<div class="primary-media"><div class="primary-media-head"><div class="primary-media-title">连续预览 <span class="badge badge-muted">${playable.length}/${group.parts.length}</span></div></div><video id="episode-player" src="${esc(mediaSrc({local_path:firstPlayable}))}" controls onended="playNextEpisodePart()"></video></div>`
      : `<div class="primary-media"><div class="primary-media-head"><div class="primary-media-title">连续预览</div></div><div class="media-placeholder">本集还没有可播放的视频片段</div></div>`;
  const timeline = group.parts.map((part, idx) => {
    const cls = part.local_path ? 'done' : part.video_status === 'failed' ? 'fail' : '';
    const action = part.local_path ? `playEpisodePart(${group.episode},${idx})` : `selectBoard('${esc(part.segment_key)}',${part.board_index})`;
    return `<button class="episode-part ${cls}" onclick="${action}" title="${esc(part.video_goal || part.label)}">${esc(part.label.replace('seg_', 'S'))}</button>`;
  }).join('');
  const missing = group.missing_parts.length ? `<div class="ref-note err">缺失片段：${group.missing_parts.map(esc).join('、')}</div>` : '<div class="ref-note">本集视频片段已齐，可以合成。</div>';
  body.innerHTML = `
    ${media}
    <div class="action-row">
      <button class="btn btn-primary" onclick="concatEpisode(${group.episode})" ${!group.can_concat ? 'disabled' : ''}>合成本集</button>
      <button class="btn" onclick="submitAllVideos()">生成可用视频</button>
      <button class="btn" onclick="refreshPipeline()">刷新</button>
    </div>
    ${missing}
    <div class="board-summary">
      <div class="board-summary-row"><div class="board-summary-title">本集状态</div><div class="board-summary-text">${Math.round(group.seconds)}s · ${group.videos_completed}/${group.videos_total} 视频完成${group.export?.desktop_path ? ` · 桌面：${esc(group.export.desktop_path)}` : ''}</div></div>
      <div class="board-summary-row"><div class="board-summary-title">时间轴</div><div class="episode-timeline">${timeline}</div></div>
    </div>
  `;
}

function playEpisodePart(episode, idx) {
  const group = videoEpisodeGroups().find(g => g.episode === episode);
  const part = group?.parts?.[idx];
  const player = document.getElementById('episode-player');
  if (!part?.local_path || !player) return;
  player.dataset.episode = String(episode);
  player.dataset.index = String(idx);
  player.src = mediaSrc({ local_path: part.local_path });
  player.play();
}

function playNextEpisodePart() {
  const player = document.getElementById('episode-player');
  if (!player) return;
  const episode = Number(player.dataset.episode || currentEpisode);
  const idx = Number(player.dataset.index || 0);
  const group = videoEpisodeGroups().find(g => g.episode === episode);
  if (!group) return;
  for (let next = idx + 1; next < group.parts.length; next++) {
    if (group.parts[next].local_path) {
      playEpisodePart(episode, next);
      return;
    }
  }
}

function renderVideoList() {
  const body = document.getElementById('mid-body');
  const rows = [];
  for (const [segKey, seg] of Object.entries(pipelineData?.narration_segments || {})) {
    for (const [idx, board] of (seg.boards || []).entries()) {
      const video = board.video || {};
      const sb = board.storyboard_image || {};
      const timing = voiceTimingInfo(board);
      const ready = (video.status || 'needed') === 'needed' && sb.status === 'completed' && !timing.issues.length;
      rows.push({ segKey, idx, board, video, sb, timing, ready });
    }
  }
  if (!rows.length) {
    body.innerHTML = '<div class="empty-state">还没有视频单元。先完成故事拆解和分镜板图。</div>';
    return;
  }
  body.innerHTML = rows.map(item => {
    const status = item.video.status || 'needed';
    const badgeClass = status === 'completed' ? 'ok' : status === 'submitted' ? 'warn' : status === 'failed' ? 'err' : '';
    const blocker = item.sb.status !== 'completed' ? '分镜图未完成' : item.timing.issues.length ? '旁白时长需重拆' : item.ready ? '可生成' : statusLabel(status);
    return `<button class="seg-card ${item.segKey === currentSegKey && item.idx === currentBoardIdx ? 'active' : ''}" onclick="selectBoard('${esc(item.segKey)}', ${item.idx})">
      <div class="sc-id">${esc(item.segKey)} · P${item.idx + 1} <span class="status-pill ${badgeClass}">${statusLabel(status)}</span></div>
      <div class="sc-meta">${esc(item.board.video_goal || '')}</div>
      <div class="sc-boards"><span class="sc-board-chip">${esc(blocker)}</span><span class="sc-board-chip">${item.board.board_duration || 0}s</span></div>
    </button>`;
  }).join('');
}

function renderTaskList() {
  const body = document.getElementById('mid-body');
  const tasks = [];
  for (const [type, bucket] of Object.entries(pipelineData?.assets || {})) {
    for (const [name, info] of Object.entries(bucket || {})) {
      if (['submitted', 'failed'].includes(info.status || '')) {
        tasks.push({ label: `${type}/${name}`, status: info.status, task: info.task_id, error: info.error });
      }
    }
  }
  for (const [segKey, seg] of Object.entries(pipelineData?.narration_segments || {})) {
    for (const [idx, board] of (seg.boards || []).entries()) {
      for (const kind of ['storyboard_image', 'video']) {
        const info = board[kind] || {};
        if (['submitted', 'failed'].includes(info.status || '')) {
          tasks.push({ label: `${kind === 'video' ? '视频' : '分镜'} ${segKey} P${idx + 1}`, status: info.status, task: info.task_id, error: info.error });
        }
      }
    }
  }
  if (!tasks.length) {
    body.innerHTML = '<div class="empty-state">当前没有生成中或失败的任务。需要查看最新状态时点击右上角刷新。</div>';
    return;
  }
  body.innerHTML = tasks.map(t => `<div class="asset-row">
    <div class="asset-main">
      <div class="asset-name">${esc(t.label)} <span class="status-pill ${t.status === 'failed' ? 'err' : 'warn'}">${statusLabel(t.status)}</span></div>
      <div class="asset-seed">${t.task ? `任务 ${esc(t.task)}` : ''}${t.error ? ` · ${esc(t.error)}` : ''}</div>
    </div>
  </div>`).join('');
}

function selectSegment(key) {
  currentSegKey = key;
  currentBoardIdx = 0;
  if (activeModule === 'storyboards') storyboardDetailMode = 'board';
  renderSegments();
  renderBoardDetail();
}

function selectBoard(key, idx) {
  currentSegKey = key;
  currentBoardIdx = idx;
  storyboardDetailMode = 'board';
  if (!['storyboards', 'videos'].includes(activeModule)) activeModule = 'storyboards';
  renderActiveModule();
  renderBoardDetail();
}

function goRelativeBoard(delta) {
  const items = allBoardRefs();
  const pos = items.findIndex(item => item.segKey === currentSegKey && item.idx === currentBoardIdx);
  const next = items[pos + delta];
  if (!next) return;
  currentSegKey = next.segKey;
  currentBoardIdx = next.idx;
  storyboardDetailMode = 'board';
  renderActiveModule();
  renderBoardDetail();
}

/* ── Board detail ── */
function clearBoardDetail() {
  document.getElementById('right-header').textContent = 'Board 详情';
  document.getElementById('right-body').innerHTML = '<div class="empty-state">选择左侧段落中的 Board 查看详情</div>';
}

function renderPromptEditor(kind, title, prompt, disabled, note) {
  const id = `${kind}-prompt-editor`;

    ? `submitStoryboardFromEditor('${esc(currentSegKey)}',${currentBoardIdx || 0})`

    <div class="prompt-editor-head">

        <div class="prompt-editor-title">${esc(title)}</div>
        <div class="prompt-editor-note">${esc(note)}</div>
      </div>

    <textarea id="${id}" spellcheck="false" placeholder="留空提交时会使用后端当前模板重新组装提示词">${esc(prompt || '')}</textarea>

  family_warm_gray: '家庭暖灰',
  hospital_cold_white: '医院冷白',
  domestic_brown_gray: '家庭压抑棕灰',
};

const TECHNIQUE_LABELS = {
  slow_push_in: '缓慢推近',
  dolly_zoom: '希区柯克变焦',
  crash_zoom: '快速拉近',
  rack_focus: '焦点转移',
  slow_motion: '慢动作',

};

function styleControlInfo(b) {
  const paletteId = b?.palette_id || '';
  const paletteLabel = paletteId ? `${PALETTE_LABELS[paletteId] || paletteId}（${paletteId}）` : '无';
  const techniques = (b?.shot_timeline || [])
    .filter(s => s && s.technique_id)
    .map(s => `${s.shot_id || 'shot'}：${TECHNIQUE_LABELS[s.technique_id] || s.technique_id}（${s.technique_id}）`);
  const refs = b?.video?.reference_images || [];
  const paletteRef = refs.find(p => typeof p === 'string' && p.includes('/palettes/'));
  return { paletteLabel, techniques, paletteRef };
}

function renderStyleControlSummary(b) {
  const info = styleControlInfo(b);
  const techniqueText = info.techniques.length ? info.techniques.join('；') : '无';
  const refText = info.paletteRef ? `<div class="board-summary-text">色板参考图：${esc(info.paletteRef)}</div>` : '';
  return `<div class="board-summary-row">
    <div class="board-summary-title">视频风格控制</div>
    <div class="board-summary-text">色板：${esc(info.paletteLabel)}</div>
    <div class="board-summary-text">镜头技法：${esc(techniqueText)}</div>
    ${refText}
  </div>`;
}
